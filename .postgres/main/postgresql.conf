# PostgreSQL Main Database Configuration for Streaming Replication
# This file configures the primary database to support read replicas

# Write-Ahead Logging (WAL) Settings
wal_level = replica                    # Enable replication
max_wal_senders = 3                    # Max number of concurrent replication connections
wal_keep_size = 64                     # Keep at least 64MB of WAL files for replicas

# Replication Settings
max_replication_slots = 3              # Max replication slots for replicas
hot_standby = on                       # Allow read queries on standby servers

# Connection Settings
max_connections = 100                  # Maximum number of concurrent connections
listen_addresses = '*'                 # Listen on all network interfaces

# Performance Settings
shared_buffers = 128MB                 # Memory for shared buffer cache
effective_cache_size = 512MB           # Planner's assumption about kernel cache size
work_mem = 4MB                         # Memory for sorting and hash operations

# Logging
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'all'
log_min_duration_statement = 1000      # Log queries taking longer than 1 second

# Checkpointing
checkpoint_timeout = 10min             # Maximum time between checkpoints
max_wal_size = 1GB                     # Trigger checkpoint at this WAL size
