# PostgreSQL Replica Configuration
# This file configures the read-only replica database

# Hot Standby Settings
hot_standby = on                       # Allow read-only queries on standby
max_standby_streaming_delay = 30s      # Max delay before canceling queries conflicting with WAL
wal_receiver_status_interval = 10s     # How often to report status to primary

# Connection Settings
max_connections = 100                  # Should match or exceed primary
listen_addresses = '*'                 # Listen on all network interfaces

# Performance Settings
shared_buffers = 128MB                 # Memory for shared buffer cache
effective_cache_size = 512MB           # Planner's assumption about kernel cache size
work_mem = 4MB                         # Memory for sorting and hash operations

# Logging
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_min_duration_statement = 1000      # Log queries taking longer than 1 second
