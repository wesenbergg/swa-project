services:
  postgres:
    image: postgres:16-alpine
    container_name: swa-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./.sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d events_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swa-network

  kong:
    image: kong:3.8
    container_name: swa-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_DNS_RESOLVER: "127.0.0.11"
      KONG_DNS_ORDER: "LAST,A,CNAME"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    networks:
      - swa-network
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./kong.yml
          target: /kong/kong.yml

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: swa-auth-service
    environment:
      PORT: 3003
      JWT_SECRET: my-secret-key-change-in-production
    networks:
      - swa-network
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./auth-service/src
          target: /app/src
        - action: rebuild
          path: ./auth-service/package.json

  command-service:
    build:
      context: ./command-service
      dockerfile: Dockerfile
    container_name: swa-command-service
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: events_db
      DB_USER: admin
      DB_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - swa-network
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./command-service/src
          target: /app/src
        - action: rebuild
          path: ./command-service/package.json

  query-service:
    build:
      context: ./query-service
      dockerfile: Dockerfile
    container_name: swa-query-service
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: events_db
      DB_USER: admin
      DB_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - swa-network
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./query-service/src
          target: /app/src
        - action: rebuild
          path: ./query-service/package.json

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: swa-ui
    ports:
      - "80:80"
    depends_on:
      - command-service
      - query-service
    networks:
      - swa-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  swa-network:
    driver: bridge
